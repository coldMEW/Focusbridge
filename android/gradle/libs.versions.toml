[versions]
agp = "8.4.0"
kotlin = "1.9.24"
ksp = "1.9.24-1.0.20"
composeBom = "2024.04.01"
composeCompiler = "1.5.14"
coreKtx = "1.12.0"
lifecycle = "2.7.0"
activityCompose = "1.9.0"
navigation = "2.7.7"
hilt = "2.51"
