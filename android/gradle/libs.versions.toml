room = "2.6.1"
okhttp = "4.12.0"
kotlinxSerialization = "1.6.3"
coroutines = "1.8.0"
junit = "4.13.2"
mockk = "1.13.10"
androidxJunit = "1.1.5"
espresso = "3.5.1"
